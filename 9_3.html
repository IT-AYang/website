<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装卸队指派</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { background: #f5f7fa; min-height: 100vh; }
        .app-layout { display: flex; min-height: 100vh; }
        
        .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; }
        .sidebar-header { padding: 14px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f0f0f0; }
        .logo { width: 28px; height: 28px; background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
        .sidebar-title { font-size: 14px; font-weight: 600; color: #262626; }
        .menu { flex: 1; padding: 4px 0; overflow-y: auto; }
        .menu-item { padding: 10px 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #595959; transition: all 0.2s; font-size: 13px; }
        .menu-item:hover { background: #e6f7ff; color: #1890ff; }
        .menu-item.active { background: #e6f7ff; color: #1890ff; border-right: 2px solid #1890ff; }
        .menu-sub { background: #fafafa; }
        .menu-sub .menu-item { padding-left: 40px; font-size: 12px; }
        .menu-arrow { margin-left: auto; font-size: 10px; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar { height: 56px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: center; }
        .search-box { width: 260px; height: 36px; background: #f5f7fa; border-radius: 4px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; color: #909399; }
        .content { flex: 1; padding: 12px; overflow-y: auto; }
        
        .card { background: #fff; border-radius: 4px; border: 1px solid #e8e8e8; }
        
        .breadcrumb { padding: 12px 16px; font-size: 12px; color: #606266; }
        .breadcrumb span { margin: 0 3px; }
        .breadcrumb .current { color: #909399; }
        
        .tabs { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #f0f0f0; }
        .tab { padding: 6px 16px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .tab.active { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
        .tab.inactive { background: #f5f5f5; color: #909399; border: 1px solid #e8e8e8; }
        .tab.completed { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #f0f0f0; }
        .calendar-title { font-size: 16px; font-weight: 600; color: #303133; }
        .calendar-nav { display: flex; gap: 8px; }
        .nav-btn { padding: 4px 12px; border: 1px solid #dcdfe6; border-radius: 4px; background: #fff; font-size: 12px; cursor: pointer; color: #606266; }
        .nav-btn:hover { color: #1890ff; border-color: #1890ff; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 16px; }
        .calendar-day-header { padding: 8px; text-align: center; font-size: 12px; color: #909399; font-weight: 600; }
        .calendar-day { min-height: 100px; padding: 8px; background: #fafafa; border-radius: 4px; cursor: pointer; transition: all 0.2s; position: relative; }
        .calendar-day:hover { background: #e6f7ff; border: 1px solid #1890ff; }
        .calendar-day.today { border: 2px solid #1890ff; }
        .calendar-day.selected { background: #e6f7ff; }
        .calendar-day.other-month { opacity: 0.4; }
        .day-number { font-size: 14px; font-weight: 600; color: #303133; margin-bottom: 8px; }
        .day-info { font-size: 11px; color: #606266; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btn { height: 36px; padding: 0 14px; border: 1px solid #dcdfe6; border-radius: 4px; background: #fff; color: #606266; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .btn:hover { color: #1890ff; border-color: #1890ff; }
        .btn-primary { background: #1890ff; color: #fff; border-color: #1890ff; }
        .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; }
        .btn-danger { color: #f56c6c; border-color: #fbc4c4; background: #fef0f0; }
        .btn-danger:hover { color: #fff; background: #f56c6c; }
        .btn-link { border: none; background: none; color: #1890ff; padding: 0 5px; }
        
        .menu-group .menu-item { justify-content: space-between; }
        .menu-group-content { display: none; }
        .menu-group.open .menu-group-content { display: block; }
        .menu-group.open .menu-arrow { transform: rotate(180deg); }
        
        .side-panel { position: fixed; right: -400px; top: 0; width: 400px; height: 100%; background: #fff; box-shadow: -2px 0 12px rgba(0, 0, 0, 0.1); z-index: 1001; transition: right 0.3s; display: flex; flex-direction: column; }
        .side-panel.open { right: 0; }
        .panel-header { padding: 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { font-size: 16px; font-weight: 600; color: #303133; }
        .close-panel { background: none; border: none; font-size: 20px; cursor: pointer; color: #909399; padding: 4px; }
        .close-panel:hover { color: #303133; }
        .panel-body { flex: 1; padding: 16px; overflow-y: auto; }
        .panel-footer { padding: 12px 16px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 10px; }
        
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .form-item { flex: 1; }
        .form-item label { display: block; margin-bottom: 6px; color: #606266; font-size: 12px; }
        .form-item label .required { color: #f56c6c; margin-right: 3px; }
        .form-item select, .form-item input { width: 100%; height: 36px; padding: 6px 10px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 12px; outline: none; }
        .form-item select:focus, .form-item input:focus { border-color: #1890ff; }
        
        .panel-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.45); display: none; z-index: 1000; }
        .panel-overlay.active { display: block; }
        
        .shift-selector { display: flex; gap: 8px; flex-wrap: wrap; }
        .shift-option { padding: 6px 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .shift-option.selected { background: #1890ff; color: #fff; border-color: #1890ff; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🚚</div>
                <span class="sidebar-title">厂内物流调度系统</span>
            </div>
            <nav class="menu">
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📋</span>
                        <span>工作台</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                </div>
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📓</span>
                        <span>基础管理</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                    <div class="menu-group-content menu-sub">
                        <div class="menu-item" onclick="navigateTo('7_1.html')"><span>📄</span><span>公司管理</span></div>
                        <div class="menu-item" onclick="navigateTo('7_2.html')"><span>🚗</span><span>车辆管理</span></div>
                        <div class="menu-item" onclick="navigateTo('7_3.html')"><span>👥</span><span>装卸队伍</span></div>
                        <div class="menu-item" onclick="navigateTo('7_4.html')"><span>👤</span><span>装卸人员</span></div>
                        <div class="menu-item" onclick="navigateTo('7_5.html')"><span>📅</span><span>排班计划</span></div>
                    </div>
                </div>
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📋</span>
                        <span>计划单管理</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                    <div class="menu-group-content menu-sub">
                        <div class="menu-item" onclick="navigateTo('8_1.html')"><span>📥</span><span>入库计划</span></div>
                        <div class="menu-item" onclick="navigateTo('8_2.html')"><span>📤</span><span>出库计划</span></div>
                    </div>
                </div>
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📋</span>
                        <span>分派管理</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                    <div class="menu-group-content menu-sub">
                        <div class="menu-item" onclick="navigateTo('9_1.html')"><span>🏢</span><span>物流公司指派</span></div>
                        <div class="menu-item" onclick="navigateTo('9_2.html')"><span>🚗</span><span>车辆指派</span></div>
                        <div class="menu-item active"><span>👥</span><span>装卸队指派</span></div>
                    </div>
                </div>
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📅</span>
                        <span>预约管理</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                    <div class="menu-group-content menu-sub">
                        <div class="menu-item"><span>🚗</span><span>车辆预约</span></div>
                        <div class="menu-item"><span>📥</span><span>入库预约</span></div>
                        <div class="menu-item"><span>📤</span><span>出库预约</span></div>
                        <div class="menu-item"><span>📋</span><span>预约管理</span></div>
                    </div>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-box">菜单搜索</div>
            </header>

            <div class="content">
                <div class="card">
                    <div class="breadcrumb">
                        分派管理 <span>/</span> <span class="current">装卸队指派</span>
                    </div>

                    <div class="tabs">
                        <div class="tab completed" onclick="filterStatus('assigned')">已指派</div>
                        <div class="tab inactive" onclick="filterStatus('unassigned')">未指派</div>
                        <div class="tab active" onclick="filterStatus('waiting')">待指派</div>
                    </div>

                    <div class="calendar-header">
                        <div class="calendar-title" id="calendarTitle">2026年5月</div>
                        <div class="calendar-nav">
                            <button class="nav-btn" onclick="prevMonth()">上个月</button>
                            <button class="nav-btn" onclick="goToday()">今天</button>
                            <button class="nav-btn" onclick="nextMonth()">下个月</button>
                        </div>
                    </div>

                    <div class="calendar-grid">
                        <div class="calendar-day-header">一</div>
                        <div class="calendar-day-header">二</div>
                        <div class="calendar-day-header">三</div>
                        <div class="calendar-day-header">四</div>
                        <div class="calendar-day-header">五</div>
                        <div class="calendar-day-header">六</div>
                        <div class="calendar-day-header">日</div>
                    </div>

                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <h3 id="panelTitle">指派装卸队</h3>
            <button class="close-panel" onclick="closePanel()">×</button>
        </div>
        <div class="panel-body">
            <div class="form-item">
                <label>装卸队</label>
                <select id="teamSelect">
                    <option value="">请选择装卸队</option>
                    <option value="1">装卸一队</option>
                    <option value="2">装卸二队</option>
                    <option value="3">装卸三队</option>
                    <option value="4">装卸四队</option>
                    <option value="5">装卸五队</option>
                </select>
            </div>
            <div class="form-item">
                <label>工作时间段</label>
                <div class="shift-selector" id="shiftSelector">
                    <div class="shift-option" onclick="toggleShift('morning')">上午 08:00-12:00</div>
                    <div class="shift-option" onclick="toggleShift('afternoon')">下午 13:00-17:00</div>
                    <div class="shift-option" onclick="toggleShift('evening')">晚班 18:00-22:00</div>
                </div>
            </div>
            <div class="form-item">
                <label>备注</label>
                <input type="text" id="remark" placeholder="请输入备注信息" style="width: 100%; height: 36px; padding: 6px 10px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 12px; outline: none;">
            </div>
        </div>
        <div class="panel-footer">
            <button class="btn btn-primary" onclick="saveAssignment()">确定</button>
            <button class="btn" onclick="closePanel()">取消</button>
        </div>
    </div>

    <script>
        const teams = [
            { id: 1, name: '装卸一队' },
            { id: 2, name: '装卸二队' },
            { id: 3, name: '装卸三队' },
            { id: 4, name: '装卸四队' },
            { id: 5, name: '装卸五队' }
        ];

        let currentYear = 2026;
        let currentMonth = 4;
        let selectedDate = null;
        let selectedShifts = new Set();
        let assignments = {};

        function init() {
            const today = new Date();
            currentYear = 2026;
            currentMonth = 4;
            renderCalendar();
        }

        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            
            const prevLastDay = new Date(currentYear, currentMonth, 0).getDate();
            const currentDays = lastDay.getDate();
            
            document.getElementById('calendarTitle').textContent = `${currentYear}年${currentMonth + 1}月`;
            
            let html = '';
            
            for (let i = startDay - 1; i >= 0; i--) {
                const day = prevLastDay - i;
                html += `<div class="calendar-day other-month" onclick="selectDate(${currentYear}, ${currentMonth - 1}, ${day})">
                    <div class="day-number">${day}</div>
                    <div class="day-info"></div>
                </div>`;
            }
            
            for (let day = 1; day <= currentDays; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasAssignment = assignments[dateStr];
                const isToday = isTodayDate(currentYear, currentMonth, day);
                const isSelected = selectedDate && selectedDate.dateStr === dateStr;
                
                html += `<div class="calendar-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}" onclick="selectDate(${currentYear}, ${currentMonth}, ${day})">
                    <div class="day-number">${day}</div>
                    <div class="day-info">${hasAssignment ? '已指派' : ''}</div>
                </div>`;
            }
            
            const remainingCells = 42 - (startDay + currentDays);
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="calendar-day other-month" onclick="selectDate(${currentYear}, ${currentMonth + 1}, ${day})">
                    <div class="day-number">${day}</div>
                    <div class="day-info"></div>
                </div>`;
            }
            
            document.getElementById('calendarGrid').innerHTML = html;
        }

        function isTodayDate(year, month, day) {
            const today = new Date();
            return today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
        }

        function selectDate(year, month, day) {
            selectedDate = {
                year,
                month,
                day,
                dateStr: `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`
            };
            
            document.getElementById('panelTitle').textContent = `${selectedDate.dateStr} 指派装卸队`;
            document.getElementById('teamSelect').value = '';
            selectedShifts.clear();
            document.querySelectorAll('.shift-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('remark').value = '';
            
            const existing = assignments[selectedDate.dateStr];
            if (existing) {
                document.getElementById('teamSelect').value = existing.teamId;
                existing.shifts.forEach(shift => toggleShift(shift, true));
                document.getElementById('remark').value = existing.remark || '';
            }
            
            document.getElementById('panelOverlay').classList.add('active');
            document.getElementById('sidePanel').classList.add('open');
        }

        function toggleShift(shift, skipUpdate = false) {
            const el = Array.from(document.querySelectorAll('.shift-option')).find(e => e.textContent.includes(shift === 'morning' ? '上午' : shift === 'afternoon' ? '下午' : '晚班'));
            if (selectedShifts.has(shift)) {
                selectedShifts.delete(shift);
                el.classList.remove('selected');
            } else {
                selectedShifts.add(shift);
                el.classList.add('selected');
            }
        }

        function saveAssignment() {
            const teamId = document.getElementById('teamSelect').value;
            const remark = document.getElementById('remark').value;
            
            if (!teamId) {
                alert('请选择装卸队');
                return;
            }
            
            if (selectedShifts.size === 0) {
                alert('请选择工作时间段');
                return;
            }
            
            assignments[selectedDate.dateStr] = {
                teamId,
                teamName: teams.find(t => t.id == teamId).name,
                shifts: Array.from(selectedShifts),
                remark
            };
            
            closePanel();
            renderCalendar();
        }

        function closePanel() {
            document.getElementById('panelOverlay').classList.remove('active');
            document.getElementById('sidePanel').classList.remove('open');
        }

        function prevMonth() {
            if (currentMonth === 0) {
                currentYear--;
                currentMonth = 11;
            } else {
                currentMonth--;
            }
            renderCalendar();
        }

        function nextMonth() {
            if (currentMonth === 11) {
                currentYear++;
                currentMonth = 0;
            } else {
                currentMonth++;
            }
            renderCalendar();
        }

        function goToday() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar();
        }

        function filterStatus(status) {
            document.querySelectorAll('.tab').forEach(el => {
                el.classList.remove('active', 'inactive', 'completed');
            });
            
            const statusMap = {
                'assigned': ['completed', '已完成', ''],
                'unassigned': ['inactive', '', '未完成'],
                'waiting': ['active', '进行中', '待处理']
            };
            
            const el = document.querySelector(`.tab.${status}`);
            el.classList.add(statusMap[status][0]);
        }

        function toggleMenu(el) {
            el.parentElement.classList.toggle('open');
        }

        function navigateTo(url) {
            window.location.href = url;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
