<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆指派</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { background: #f5f7fa; min-height: 100vh; }
        .app-layout { display: flex; min-height: 100vh; }
        
        .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; }
        .sidebar-header { padding: 14px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f0f0f0; }
        .logo { width: 28px; height: 28px; background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
        .sidebar-title { font-size: 14px; font-weight: 600; color: #262626; }
        .menu { flex: 1; padding: 4px 0; overflow-y: auto; }
        .menu-item { padding: 10px 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #595959; transition: all 0.2s; font-size: 13px; }
        .menu-item:hover { background: #e6f7ff; color: #1890ff; }
        .menu-item.active { background: #e6f7ff; color: #1890ff; border-right: 2px solid #1890ff; }
        .menu-sub { background: #fafafa; }
        .menu-sub .menu-item { padding-left: 40px; font-size: 12px; }
        .menu-arrow { margin-left: auto; font-size: 10px; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar { height: 56px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: center; }
        .search-box { width: 260px; height: 36px; background: #f5f7fa; border-radius: 4px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; color: #909399; }
        .content { flex: 1; padding: 12px; overflow-y: auto; }
        
        .card { background: #fff; border-radius: 4px; border: 1px solid #e8e8e8; }
        
        .breadcrumb { padding: 12px 16px; font-size: 12px; color: #606266; }
        .breadcrumb span { margin: 0 3px; }
        .breadcrumb .current { color: #909399; }
        
        .btn { height: 36px; padding: 0 14px; border: 1px solid #dcdfe6; border-radius: 4px; background: #fff; color: #606266; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .btn:hover { color: #1890ff; border-color: #1890ff; }
        .btn-primary { background: #1890ff; color: #fff; border-color: #1890ff; }
        .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }
        .btn-link { border: none; background: none; color: #1890ff; padding: 0 5px; }
        .btn-link:hover { color: #40a9ff; }
        
        .assign-container { display: flex; gap: 12px; padding: 0 16px 16px; }
        
        .order-list { width: 350px; background: #eef1f6; border: 1px solid #dcdfe6; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        .order-item { padding: 12px; background: #fff; border-bottom: 1px solid #e8e8e8; cursor: pointer; transition: all 0.2s; }
        .order-item:last-child { border-bottom: none; }
        .order-item:hover { background: #e6f7ff; }
        .order-item.active { background: #e6f7ff; }
        .order-no { font-size: 12px; color: #1890ff; font-weight: 500; }
        .order-type { font-size: 11px; color: #67c23a; margin-top: 4px; }
        .order-company { font-size: 11px; color: #909399; margin-top: 3px; }
        
        .assign-content { flex: 1; display: flex; flex-direction: column; background: #fff; border: 1px solid #e8e8e8; border-radius: 4px; }
        .assign-header { padding: 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .assign-header h4 { font-size: 14px; font-weight: 500; color: #303133; }
        
        .table-container { flex: 1; overflow-x: auto; padding: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; color: #303133; }
        td { color: #606266; }
        tbody tr:hover { background: #f5f7fa; }
        .empty-state { text-align: center; padding: 40px; color: #909399; font-size: 12px; }
        
        .menu-group .menu-item { justify-content: space-between; }
        .menu-group-content { display: none; }
        .menu-group.open .menu-group-content { display: block; }
        .menu-group.open .menu-arrow { transform: rotate(180deg); }
        
        .side-panel { position: fixed; right: -500px; top: 0; width: 500px; height: 100%; background: #fff; box-shadow: -2px 0 12px rgba(0, 0, 0, 0.1); z-index: 1001; transition: right 0.3s; display: flex; flex-direction: column; }
        .side-panel.open { right: 0; }
        .panel-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { color: #303133; font-size: 14px; font-weight: 600; }
        .close-panel { background: none; border: none; font-size: 18px; cursor: pointer; color: #909399; }
        .close-panel:hover { color: #303133; }
        .panel-body { flex: 1; padding: 12px; overflow-y: auto; }
        .panel-footer { padding: 12px 16px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 10px; background: #f5f5f5; }
        
        .panel-table-container { border: 1px solid #dcdfe6; border-radius: 4px; overflow-x: auto; }
        .panel-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .panel-table th, .panel-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .panel-table th { background: #fafafa; font-weight: 600; color: #303133; }
        
        .panel-pagination { padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #606266; }
        .pagination-right { display: flex; align-items: center; gap: 10px; }
        .page-btn { width: 28px; height: 28px; border: 1px solid #dcdfe6; border-radius: 4px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .page-btn:hover { color: #1890ff; border-color: #1890ff; }
        .page-btn.active { background: #1890ff; color: #fff; border-color: #1890ff; }
        .page-btn:disabled { cursor: not-allowed; opacity: 0.5; }
        .page-select { padding: 3px 6px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 12px; }
        
        .checkbox { width: 14px; height: 14px; cursor: pointer; }
        
        .panel-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.45); display: none; z-index: 1000; }
        .panel-overlay.active { display: block; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🚚</div>
                <span class="sidebar-title">厂内物流调度系统</span>
            </div>
            <nav class="menu">
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📋</span>
                        <span>工作台</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                </div>
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📓</span>
                        <span>基础管理</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                    <div class="menu-group-content menu-sub">
                        <div class="menu-item" onclick="navigateTo('7_1.html')"><span>📄</span><span>公司管理</span></div>
                        <div class="menu-item" onclick="navigateTo('7_2.html')"><span>🚗</span><span>车辆管理</span></div>
                        <div class="menu-item" onclick="navigateTo('7_3.html')"><span>👥</span><span>装卸队伍</span></div>
                        <div class="menu-item" onclick="navigateTo('7_4.html')"><span>👤</span><span>装卸人员</span></div>
                        <div class="menu-item" onclick="navigateTo('7_5.html')"><span>📅</span><span>排班计划</span></div>
                    </div>
                </div>
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📋</span>
                        <span>计划单管理</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                    <div class="menu-group-content menu-sub">
                        <div class="menu-item" onclick="navigateTo('8_1.html')"><span>📥</span><span>入库计划</span></div>
                        <div class="menu-item" onclick="navigateTo('8_2.html')"><span>📤</span><span>出库计划</span></div>
                    </div>
                </div>
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📋</span>
                        <span>分派管理</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                    <div class="menu-group-content menu-sub">
                        <div class="menu-item" onclick="navigateTo('9_1.html')"><span>🏢</span><span>物流公司指派</span></div>
                        <div class="menu-item active"><span>🚗</span><span>车辆指派</span></div>
                        <div class="menu-item" onclick="navigateTo('9_3.html')"><span>👥</span><span>装卸队指派</span></div>
                    </div>
                </div>
                <div class="menu-group open">
                    <div class="menu-item" onclick="toggleMenu(this)">
                        <span>📅</span>
                        <span>预约管理</span>
                        <span class="menu-arrow">∨</span>
                    </div>
                    <div class="menu-group-content menu-sub">
                        <div class="menu-item" onclick="navigateTo('10_1.html')"><span>🚗</span><span>车辆预约</span></div>
                        <div class="menu-item"><span>📥</span><span>入库预约</span></div>
                        <div class="menu-item"><span>📤</span><span>出库预约</span></div>
                        <div class="menu-item"><span>📋</span><span>预约管理</span></div>
                    </div>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-box">菜单搜索</div>
            </header>

            <div class="content">
                <div class="card">
                    <div class="breadcrumb">
                        分派管理 <span>/</span> <span class="current">车辆指派</span>
                    </div>

                    <div class="assign-container">
                        <div class="order-list" id="orderList">
                            <!-- 计划单列表 -->
                        </div>

                        <div class="assign-content">
                            <div class="assign-header">
                                <h4 id="selectedOrderTitle">当前选择：</h4>
                                <button class="btn btn-primary" onclick="openAssignPanel()" id="assignBtn">指派车辆</button>
                            </div>

                            <div class="table-container">
                                <table id="assignedVehicles">
                                    <thead>
                                        <tr>
                                            <th>车辆</th>
                                            <th>物流公司</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td colspan="3" class="empty-state">暂无数据</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <h3>选择车辆</h3>
            <button class="close-panel" onclick="closePanel()">×</button>
        </div>
        <div class="panel-body">
            <div class="panel-table-container">
                <table class="panel-table" id="vehicleSelectTable">
                    <thead>
                        <tr>
                            <th><input type="checkbox" class="checkbox" id="selectAllPanel" onchange="toggleSelectAllPanel()"></th>
                            <th>车牌号</th>
                            <th>所属公司</th>
                            <th>车型</th>
                        </tr>
                    </thead>
                    <tbody id="vehicleTableBody"></tbody>
                </table>
            </div>
            <div class="panel-pagination">
                <span>共 <span id="panelTotalCount">0</span> 条</span>
                <div class="pagination-right">
                    <button class="page-btn" id="panelPrevBtn" onclick="prevPanelPage()" disabled>◀</button>
                    <button class="page-btn active" id="pageBtn1">1</button>
                    <button class="page-btn" id="panelNextBtn" onclick="nextPanelPage()" disabled>▶</button>
                </div>
            </div>
        </div>
        <div class="panel-footer">
            <button class="btn btn-primary" onclick="confirmAssign()">确定</button>
            <button class="btn" onclick="closePanel()">取消</button>
        </div>
    </div>

    <script>
        const orders = [
            { id: 1, orderNo: 'IMP20221202-0003', type: '入库计划', company: '京东物流成都分公司' },
            { id: 2, orderNo: 'IMP20221202-0002', type: '入库计划', company: '京东物流成都分公司' },
            { id: 3, orderNo: 'OMP20221202-0002', type: '出库计划', company: '京东物流成都分公司' },
            { id: 4, orderNo: 'OMP20221202-0002', type: '出库计划', company: '顺丰物流成都分公司' }
        ];

        const vehicles = [
            { id: 1, plate: '京A15489', company: '京东物流成都分公司', type: '半挂车' },
            { id: 2, plate: '苏D89012', company: '京东物流成都分公司', type: '特种车' },
            { id: 3, plate: '粤C34567', company: '全球通物流有限公司', type: '冷藏车' },
            { id: 4, plate: '闽E-R7890', company: '全球通物流有限公司', type: '平板车' },
            { id: 5, plate: '沪B67890', company: '速达物流有限公司', type: '厢式货车' },
            { id: 6, plate: '浙E54321', company: '邮政物流公司', type: '危险品车' },
            { id: 7, plate: '川A98989', company: '顺丰物流成都分公司', type: '货车' },
            { id: 8, plate: '鲁A-Z1234', company: '顺丰物流成都分公司', type: '集装箱车' }
        ];

        let assignedVehicles = {};
        let selectedOrderId = null;
        let selectedVehicleIds = new Set();
        let panelCurrentPage = 1;
        const panelPageSize = 5;

        function init() {
            renderOrderList();
            if (orders.length > 0) {
                selectOrder(orders[0].id);
            }
        }

        function renderOrderList() {
            const list = document.getElementById('orderList');
            list.innerHTML = orders.map(order => `
                <div class="order-item ${selectedOrderId === order.id ? 'active' : ''}" onclick="selectOrder(${order.id})">
                    <div class="order-no">${order.orderNo}</div>
                    <div class="order-type">${order.type}</div>
                    <div class="order-company">${order.company}</div>
                </div>
            `).join('');
        }

        function selectOrder(orderId) {
            selectedOrderId = orderId;
            const order = orders.find(o => o.id === orderId);
            document.getElementById('selectedOrderTitle').textContent = '当前选择：' + (order ? order.orderNo : '');
            renderOrderList();
            renderAssignedVehicles();
        }

        function renderAssignedVehicles() {
            const tbody = document.getElementById('assignedVehicles').querySelector('tbody');
            const assigned = assignedVehicles[selectedOrderId] || [];

            if (assigned.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-state">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = assigned.map(v => `
                <tr>
                    <td>${v.plate}</td>
                    <td>${v.company}</td>
                    <td><button class="btn btn-link" onclick="removeVehicle(${v.id})">删除</button></td>
                </tr>
            `).join('');
        }

        function openAssignPanel() {
            if (!selectedOrderId) {
                alert('请先选择一个计划单');
                return;
            }
            selectedVehicleIds.clear();
            panelCurrentPage = 1;
            renderVehiclePanel();
            document.getElementById('panelOverlay').classList.add('active');
            document.getElementById('sidePanel').classList.add('open');
        }

        function renderVehiclePanel() {
            const tbody = document.getElementById('vehicleTableBody');
            const start = (panelCurrentPage - 1) * panelPageSize;
            const end = start + panelPageSize;
            const pageData = vehicles.slice(start, end);

            const assigned = assignedVehicles[selectedOrderId] || [];
            const assignedIds = new Set(assigned.map(v => v.id));

            tbody.innerHTML = pageData.map(v => {
                const isAssigned = assignedIds.has(v.id);
                return `
                    <tr>
                        <td><input type="checkbox" class="checkbox" data-id="${v.id}" ${selectedVehicleIds.has(v.id) ? 'checked' : ''} ${isAssigned ? 'disabled' : ''} onchange="toggleSelectVehicle(${v.id})"></td>
                        <td>${v.plate}</td>
                        <td>${v.company}</td>
                        <td>${v.type}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('panelTotalCount').textContent = vehicles.length;
            const totalPages = Math.ceil(vehicles.length / panelPageSize);
            document.getElementById('panelPrevBtn').disabled = panelCurrentPage <= 1;
            document.getElementById('panelNextBtn').disabled = panelCurrentPage >= totalPages;
        }

        function toggleSelectVehicle(vehicleId) {
            if (selectedVehicleIds.has(vehicleId)) {
                selectedVehicleIds.delete(vehicleId);
            } else {
                selectedVehicleIds.add(vehicleId);
            }
        }

        function toggleSelectAllPanel() {
            const selectAll = document.getElementById('selectAllPanel').checked;
            const start = (panelCurrentPage - 1) * panelPageSize;
            const end = start + panelPageSize;
            const pageData = vehicles.slice(start, end);

            const assigned = assignedVehicles[selectedOrderId] || [];
            const assignedIds = new Set(assigned.map(v => v.id));

            pageData.forEach(v => {
                if (!assignedIds.has(v.id)) {
                    if (selectAll) {
                        selectedVehicleIds.add(v.id);
                    } else {
                        selectedVehicleIds.delete(v.id);
                    }
                }
            });
            renderVehiclePanel();
        }

        function confirmAssign() {
            if (selectedVehicleIds.size === 0) {
                alert('请选择要指派的车辆');
                return;
            }

            const selectedVehicles = vehicles.filter(v => selectedVehicleIds.has(v.id));

            if (!assignedVehicles[selectedOrderId]) {
                assignedVehicles[selectedOrderId] = [];
            }

            selectedVehicles.forEach(v => {
                assignedVehicles[selectedOrderId].push({ id: v.id, plate: v.plate, company: v.company });
            });

            selectedVehicleIds.clear();
            closePanel();
            renderAssignedVehicles();
        }

        function removeVehicle(vehicleId) {
            if (!confirm('确定要取消该车辆指派吗？')) return;
            assignedVehicles[selectedOrderId] = assignedVehicles[selectedOrderId].filter(v => v.id !== vehicleId);
            renderAssignedVehicles();
        }

        function closePanel() {
            document.getElementById('panelOverlay').classList.remove('active');
            document.getElementById('sidePanel').classList.remove('open');
        }

        function prevPanelPage() {
            if (panelCurrentPage > 1) {
                panelCurrentPage--;
                renderVehiclePanel();
            }
        }

        function nextPanelPage() {
            const totalPages = Math.ceil(vehicles.length / panelPageSize);
            if (panelCurrentPage < totalPages) {
                panelCurrentPage++;
                renderVehiclePanel();
            }
        }

        function toggleMenu(el) {
            el.parentElement.classList.toggle('open');
        }

        function navigateTo(url) {
            window.location.href = url;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
